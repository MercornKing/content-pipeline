name: Process Drafts

on:
  push:
    paths:
      - "drafts/**.docx"
      - "affiliate_links.json"
  workflow_dispatch:
    inputs:
      force:
        description: "Reprocess all files"
        required: false
        default: "false"

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-docx markdownify

      - name: Run processor
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python process.py --force
          else
            python process.py
          fi

      - name: Commit output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ content/site.js
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: publish new article [skip ci]"
          git push
