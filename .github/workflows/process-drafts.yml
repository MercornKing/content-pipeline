name: Process Drafts

on:
  push:
    paths:
      - "drafts/**.docx"          # triggers only when a .docx lands in /drafts
      - "affiliate_links.json"    # or when you update your links
  workflow_dispatch:              # allows manual trigger from GitHub UI
    inputs:
      force:
        description: "Reprocess all files (even existing ones)"
        required: false
        default: "false"

jobs:
  process:
    runs-on: ubuntu-latest

    permissions:
      contents: write             # needed to commit processed files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-docx markdownify

      - name: Run processor
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python process.py --force
          else
            python process.py
          fi

      - name: Commit processed files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: process drafts [skip ci]"
          git push
